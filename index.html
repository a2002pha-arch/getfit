<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>المدرب الشخصي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
 
body{
  font-family:'Cairo',sans-serif;
  background:#0a0a0a;
  display:flex;
  flex-direction:column;
}
 
/* ══ HEADER ══ */
.header{
  text-align:center;
  padding:32px 20px 20px;
  position:relative;
  z-index:2;
  flex-shrink:0;
}
.header-title{
  font-family:'Tajawal',sans-serif;
  font-size:clamp(22px,4vw,32px);
  font-weight:900;
  color:#fff;
  letter-spacing:1px;
  margin-bottom:4px;
}
.header-sub{
  font-size:13px;
  color:rgba(255,255,255,.4);
}
 
/* ══ SPLIT SCREEN ══ */
.split{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  overflow:hidden;
}
 
/* ══ SECTION BASE ══ */
.section{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px 24px;
  cursor:pointer;
  overflow:hidden;
  transition:flex .4s cubic-bezier(.4,0,.2,1);
}
.section::before{
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .3s;
}
.section:hover::before{opacity:1;}
 
/* WORKOUT SECTION — داكن قوي، أحمر/برتقالي */
.section-workout{
  background:#0d0d0d;
  border-left:1px solid rgba(255,255,255,.05);
}
.section-workout::before{
  background:radial-gradient(ellipse at 50% 100%, rgba(255,60,0,.18) 0%, transparent 70%);
}
.section-workout .section-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 30% 70%, rgba(255,80,0,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,40,40,.06) 0%, transparent 50%);
}
.section-workout .section-icon{
  font-size:64px;
  margin-bottom:16px;
  filter:drop-shadow(0 0 20px rgba(255,80,0,.5));
  position:relative;
  z-index:1;
  animation:pulse-fire 2s ease-in-out infinite;
}
@keyframes pulse-fire{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px rgba(255,80,0,.5));}
  50%{transform:scale(1.08);filter:drop-shadow(0 0 35px rgba(255,80,0,.8));}
}
.section-workout .section-title{
  font-family:'Tajawal',sans-serif;
  font-size:clamp(20px,3.5vw,28px);
  font-weight:900;
  color:#fff;
  margin-bottom:8px;
  position:relative;z-index:1;
}
.section-workout .section-desc{
  font-size:12px;
  color:rgba(255,255,255,.45);
  text-align:center;
  line-height:1.6;
  margin-bottom:20px;
  position:relative;z-index:1;
}
.section-workout .section-btn{
  padding:12px 28px;
  border-radius:99px;
  border:none;
  background:linear-gradient(135deg,#ff3c00,#ff6b00);
  color:#fff;
  font-family:'Cairo',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  position:relative;z-index:1;
  box-shadow:0 4px 20px rgba(255,60,0,.35);
  transition:transform .15s,box-shadow .15s;
}
.section-workout .section-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(255,60,0,.5);
}
.section-workout .tags{
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  margin-bottom:20px;position:relative;z-index:1;
}
.section-workout .tag{
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:99px;
  background:rgba(255,80,0,.15);
  border:1px solid rgba(255,80,0,.3);
  color:rgba(255,120,50,.9);
}
 
/* CALORIES SECTION — فاتح دافئ */
.section-calories{
  background:#f5f0e8;
}
.section-calories::before{
  background:radial-gradient(ellipse at 50% 0%, rgba(34,197,94,.12) 0%, transparent 60%);
}
.section-calories .section-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(34,197,94,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(250,204,21,.1) 0%, transparent 50%);
}
.section-calories .section-icon{
  font-size:64px;
  margin-bottom:16px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.1));
  position:relative;z-index:1;
  animation:float-food 3s ease-in-out infinite;
}
@keyframes float-food{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
.section-calories .section-title{
  font-family:'Tajawal',sans-serif;
  font-size:clamp(20px,3.5vw,28px);
  font-weight:900;
  color:#1a1a1a;
  margin-bottom:8px;
  position:relative;z-index:1;
}
.section-calories .section-desc{
  font-size:12px;
  color:rgba(0,0,0,.45);
  text-align:center;
  line-height:1.6;
  margin-bottom:20px;
  position:relative;z-index:1;
}
.section-calories .section-btn{
  padding:12px 28px;
  border-radius:99px;
  border:none;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:#fff;
  font-family:'Cairo',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  position:relative;z-index:1;
  box-shadow:0 4px 20px rgba(34,197,94,.3);
  transition:transform .15s,box-shadow .15s;
}
.section-calories .section-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(34,197,94,.45);
}
.section-calories .tags{
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  margin-bottom:20px;position:relative;z-index:1;
}
.section-calories .tag{
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:99px;
  background:rgba(34,197,94,.12);
  border:1px solid rgba(34,197,94,.3);
  color:rgba(22,163,74,.9);
}
 
/* DIVIDER */
.divider{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:44px;height:44px;
  border-radius:50%;
  background:#0a0a0a;
  border:2px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  z-index:10;
  color:rgba(255,255,255,.3);
  font-weight:700;
}
 
/* DECORATIVE LINES */
.section-workout::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#ff3c00,transparent);
  opacity:.4;
}
.section-calories::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#22c55e,transparent);
  opacity:.4;
}
 
/* Stats pills */
.stats{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  position:relative;z-index:1;
}
.stat-pill{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 14px;border-radius:12px;
  min-width:60px;
}
.section-workout .stat-pill{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
}
.section-calories .stat-pill{
  background:rgba(0,0,0,.06);
  border:1px solid rgba(0,0,0,.08);
}
.stat-num{
  font-family:'Tajawal',sans-serif;
  font-size:18px;font-weight:800;
}
.section-workout .stat-num{color:#ff6b00;}
.section-calories .stat-num{color:#16a34a;}
.stat-lbl{font-size:9px;opacity:.5;margin-top:1px;}
.section-workout .stat-lbl{color:#fff;}
.section-calories .stat-lbl{color:#000;}
 
@media(max-width:500px){
  .split{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
  .divider{top:50%;left:50%;}
}
</style>
</head>
<body>
 
<div class="header">
  <div class="header-title">🏅 المدرب الشخصي</div>
  <div class="header-sub">اختر قسمك وابدأ رحلتك</div>
</div>
 
<div class="split">
 
  <!-- WORKOUT -->
  <div class="section section-workout" onclick="goWorkout()">
    <div class="section-bg"></div>
    <div class="section-icon">🔥</div>
    <div class="section-title">التمرين</div>
    <div class="section-desc">برامج تمرين احترافية<br/>مع مؤقت وتتبع تقدمك</div>
    <div class="tags">
      <span class="tag">💪 5 برامج</span>
      <span class="tag">⏱️ مؤقت</span>
      <span class="tag">📊 تقدمك</span>
    </div>
    <div class="stats">
      <div class="stat-pill"><div class="stat-num">108</div><div class="stat-lbl">تمرين</div></div>
      <div class="stat-pill"><div class="stat-num">5</div><div class="stat-lbl">برنامج</div></div>
      <div class="stat-pill"><div class="stat-num">🏆</div><div class="stat-lbl">إنجازات</div></div>
    </div>
    <button class="section-btn" style="margin-top:20px">ابدأ التمرين →</button>
  </div>
 
  <!-- CALORIES -->
  <div class="section section-calories" onclick="goCalories()">
    <div class="section-bg"></div>
    <div class="section-icon">🥗</div>
    <div class="section-title">السعرات</div>
    <div class="section-desc">احسب احتياجك اليومي<br/>وتتبع وجباتك بسهولة</div>
    <div class="tags">
      <span class="tag">🔢 حاسبة دقيقة</span>
      <span class="tag">📅 سجل يومي</span>
      <span class="tag">🥘 25+ طعام</span>
    </div>
    <div class="stats">
      <div class="stat-pill"><div class="stat-num">25+</div><div class="stat-lbl">طعام</div></div>
      <div class="stat-pill"><div class="stat-num">📈</div><div class="stat-lbl">تقدم</div></div>
      <div class="stat-pill"><div class="stat-num">💧</div><div class="stat-lbl">ماكروز</div></div>
    </div>
    <button class="section-btn" style="margin-top:20px">احسب السعرات →</button>
  </div>
 
</div>
 
<!-- Divider badge -->
<div class="divider" style="position:fixed">VS</div>
 
<script>
function goWorkout(){
  alert('قسم التمرين — سيُضاف لاحقاً ✅');
}
function goCalories(){
  alert('قسم السعرات — سيُضاف لاحقاً ✅');
}
</script>
</body>
</html>
